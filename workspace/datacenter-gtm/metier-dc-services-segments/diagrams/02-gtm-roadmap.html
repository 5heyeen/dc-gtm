<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metier DC — GTM Roadmap 2026–2028</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; padding: 32px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
        #chart-wrapper { background: white; border-radius: 8px; padding: 24px 24px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow-x: auto; }
        .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; }
        .swatch { width: 14px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .tooltip {
            position: fixed; background: #1a1a1a; color: white;
            padding: 12px 16px; border-radius: 6px; font-size: 13px;
            max-width: 320px; pointer-events: none; opacity: 0;
            transition: opacity 0.15s; z-index: 100; line-height: 1.6;
        }
        .tooltip.visible { opacity: 1; }
        .tooltip strong { display: block; font-size: 13px; margin-bottom: 4px; }
        .tooltip .detail { font-size: 12px; color: #ccc; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>Metier DC — GTM Roadmap 2026–2028</h1>
    <p class="subtitle">Three-year go-to-market sequence. Hover over bars for detail.</p>
    <div id="chart-wrapper">
        <svg id="chart"></svg>
        <div class="legend" id="legend"></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        const CATS = {
            "Infrastructure": { color:"#6b7280", label:"Infrastructure / Partnerships" },
            "BD Primary":     { color:"#1a7a4a", label:"BD — Primary segments" },
            "BD Secondary":   { color:"#f0a500", label:"BD — Secondary segments" },
            "Expansion":      { color:"#3b82f6", label:"Expansion opportunities" },
            "Academy":        { color:"#8b5cf6", label:"Metier Academy DC Track" },
            "Milestone":      { color:"#1a1a1a", label:"Milestone" }
        };

        const tasks = [
            { name:"Norconsult teaming agreement", start:0, end:3, cat:"Infrastructure",
              detail:"Pre-agreed scope allocation, exclusivity clauses. Covers MEP engineering, grid connection, fire protection, uavhengig kontroll. Metier as prime; Norconsult as sub." },
            { name:"BD: PE-backed developers", start:0, end:6, cat:"BD Primary",
              detail:"Targets: Fossefall (UA+OE), Kitebrook (contract strategy), Bifrost Edge (Early-Phase). Entry via PE sponsors (Infranode, TVM Capital, Ferd). Revenue: NOK 5–20M/project." },
            { name:"BD: Colo operators", start:3, end:9, cat:"BD Primary",
              detail:"Targets: Bulk Infrastructure (portfolio governance), Green Mountain, Stack/DigiPlex. Entry: OE/PMC from EPC award. Revenue: NOK 3–10M/project." },
            { name:"🏆 First DC reference win", start:6, end:6, cat:"Milestone",
              detail:"Target: at least one signed engagement by mid-2026. The reference that unlocks the rest of the Norwegian DC market." },
            { name:"High-Security segment entry", start:12, end:24, cat:"BD Secondary",
              detail:"Entry via Skygard OSL2 or similar. Pitch: contract strategy for cleared vs. non-cleared scope split. Revenue: NOK 10–30M/project. Constraint: no cleared PM capability until Year 3." },
            { name:"Utility/Energy segment entry", start:15, end:24, cat:"BD Secondary",
              detail:"Entry via existing Metier energy sector relationships. Targets: Eidsiva Lighthavn, Eviny, Statkraft Ventures. Pitch: pre-FID concept selection." },
            { name:"Launch LTA service line", start:12, end:18, cat:"Expansion",
              detail:"Lender's Technical Advisory: independent technical DD and construction monitoring for project finance lenders. Hire 1 senior LTA specialist. Legal partner: Wikborg Rein or BAHR." },
            { name:"Begin Cleared PM Cadre", start:12, end:24, cat:"Expansion",
              detail:"Apply for sikkerhetsklarering for 3–5 identified PMs. 6+ months per person. Develops the structural moat for Pattern B segment. No Norwegian PM firm has done this systematically." },
            { name:"LTA fully operational", start:24, end:36, cat:"Expansion",
              detail:"Recurring monthly retainer revenue from lenders. Direct PE/lender relationships create follow-on advisory. First-mover advantage in Norway — Mitchell McDermott is the global benchmark." },
            { name:"Cleared PM team ready", start:30, end:36, cat:"Expansion",
              detail:"First cleared PM delivery capability. Opens full Pattern B segment. Durable moat — clearance processing cannot be fast-tracked by competitors." },
            { name:"Academy DC Track live", start:24, end:36, cat:"Academy",
              detail:"DC-specific PM curriculum via Metier Academy: MEP package management, commissioning planning, long-lead equipment procurement, Norwegian DC regulatory context." }
        ];

        const totalMonths = 36;
        const rowH = 34;
        const rowGap = 6;
        const padL = 200, padR = 20, padT = 50, padB = 40;
        const nRows = tasks.length;
        const H = padT + nRows*(rowH+rowGap) + padB;
        const W = 860;
        const barW = W - padL - padR;

        function mx(month){ return padL + (month/totalMonths)*barW; }

        const svg = document.getElementById("chart");
        svg.setAttribute("width", W);
        svg.setAttribute("height", H);
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

        function el(tag, attrs, parent){
            const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
            for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
            if(parent) parent.appendChild(e);
            return e;
        }

        // Year bands
        [[0,12,"2026 — Build Reference"],[12,24,"2027 — Expand"],[24,36,"2028+ — Establish Position"]].forEach(([s,e,lbl],i) => {
            el("rect",{x:mx(s),y:0,width:mx(e)-mx(s),height:padT,fill:i%2===0?"#f0f4f8":"#e8edf3"},svg);
            el("rect",{x:mx(s),y:padT,width:mx(e)-mx(s),height:H-padT-padB,fill:i%2===0?"#fafafa":"#f4f4f4"},svg);
            el("text",{x:(mx(s)+mx(e))/2,y:padT-10,"text-anchor":"middle",fill:"#333","font-size":"12","font-weight":"700"},svg).textContent=lbl;
        });

        // Month gridlines
        for(let m=0;m<=36;m+=3){
            el("line",{x1:mx(m),y1:padT,x2:mx(m),y2:H-padB,stroke:"#ddd","stroke-width":"1"},svg);
            if(m%6===0 && m>0 && m<36){
                const yr = 2026+Math.floor(m/12);
                const mo = (m%12)+1;
                el("text",{x:mx(m),y:H-padB+14,"text-anchor":"middle",fill:"#aaa","font-size":"10"},svg).textContent=`Q${Math.ceil(mo/3)} ${yr}`;
            }
        }

        // Year separators
        [12,24].forEach(m => el("line",{x1:mx(m),y1:0,x2:mx(m),y2:H-padB,stroke:"#bbb","stroke-width":"1.5","stroke-dasharray":"4,3"},svg));

        const tip = document.getElementById("tooltip");

        tasks.forEach((t, i) => {
            const y = padT + i*(rowH+rowGap);
            const cat = CATS[t.cat];

            // Row label
            el("text",{x:padL-8,y:y+rowH/2+4,"text-anchor":"end",fill:"#333","font-size":"12"},svg).textContent=t.name;

            if(t.cat === "Milestone"){
                // Diamond
                const cx = mx(t.start);
                const cy = y + rowH/2;
                const s = 10;
                const path = `M${cx},${cy-s} L${cx+s},${cy} L${cx},${cy+s} L${cx-s},${cy} Z`;
                const d = el("path",{d:path,fill:cat.color,stroke:"white","stroke-width":"2",cursor:"pointer"},svg);
                d.addEventListener("mouseenter",()=>{
                    d.setAttribute("transform",`scale(1.2) translate(${cx*0.2*-1},${cy*0.2*-1})`);
                    tip.innerHTML=`<strong>${t.name}</strong><div class="detail">${t.detail}</div>`;
                    tip.classList.add("visible");
                });
                d.addEventListener("mousemove",e=>{ tip.style.left=(e.clientX+16)+"px"; tip.style.top=(e.clientY-10)+"px"; });
                d.addEventListener("mouseleave",()=>{ d.removeAttribute("transform"); tip.classList.remove("visible"); });
            } else {
                const x = mx(t.start);
                const w = mx(t.end) - mx(t.start);
                const g = el("g",{cursor:"pointer"},svg);
                const rect = el("rect",{x:x,y:y+4,width:Math.max(w,4),height:rowH-8,rx:"3",fill:cat.color,opacity:"0.85"},g);

                // Bar label if wide enough
                if(w > 60){
                    el("text",{x:x+8,y:y+rowH/2+4,fill:"white","font-size":"11","font-weight":"500","pointer-events":"none"},g).textContent=
                        w>120?t.name:(t.name.length>20?t.name.substring(0,18)+"…":t.name);
                }

                g.addEventListener("mouseenter",()=>{
                    rect.setAttribute("opacity","1");
                    rect.setAttribute("stroke","#333");
                    rect.setAttribute("stroke-width","1.5");
                    const dur = t.end-t.start;
                    tip.innerHTML=`<strong>${t.name}</strong>
                        <div style="font-size:12px;color:#aaa;margin-bottom:4px">Duration: ${dur} month${dur!==1?"s":""} | ${t.cat}</div>
                        <div class="detail">${t.detail}</div>`;
                    tip.classList.add("visible");
                });
                g.addEventListener("mousemove",e=>{ tip.style.left=(e.clientX+16)+"px"; tip.style.top=(e.clientY-10)+"px"; });
                g.addEventListener("mouseleave",()=>{
                    rect.setAttribute("opacity","0.85");
                    rect.removeAttribute("stroke");
                    tip.classList.remove("visible");
                });
            }
        });

        // Build legend
        const legEl = document.getElementById("legend");
        Object.entries(CATS).forEach(([,cat]) => {
            const li = document.createElement("div");
            li.className = "li";
            li.innerHTML = `<div class="swatch" style="background:${cat.color}"></div><span>${cat.label}</span>`;
            legEl.appendChild(li);
        });
    </script>
</body>
</html>
